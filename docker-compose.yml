services:
  postgres-db:
    image: postgres:15-alpine
    container_name: db-sincronizador
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sincronizador_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sincronizador_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  seeder:
    image: python:3.12-slim
    container_name: seeder-sincronizador
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: sincronizador_db
      DB_USER: postgres
      DB_PASSWORD: admin
      CSV_PATH: /seed/data/seed_clientes.csv
    volumes:
      - ./seed:/seed
    command: >
      sh -c "pip install --no-cache-dir -r /seed/requirements.txt &&
             python /seed/seeder.py"

volumes:
  postgres_data: